spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        default_schema: voltcommerce

  datasource:
    hikari:
      maximum-pool-size: 5

  flyway:
    schemas: voltcommerce
    default-schema: voltcommerce
    create-schemas: true

logging:
  level:
    com.voltcommerce: INFO
    org.springframework: WARN
    org.hibernate: WARN

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
